name: wordsnap
description: "A Flutter learning prototype that applies WordFlow's architecture to a word-capture workflow."
publish_to: "none"
version: 0.1.5+6

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  image_cropper: 9.1.0
  image_picker: 1.2.0
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  # 7.2.0 uses Color.toARGB32(), which is unavailable in the current
  # GitHub Actions Flutter 3.27.0 toolchain.
  image_cropper_platform_interface: 7.1.0

flutter:
  uses-material-design: true
  assets:
    - bell_fast.wav
    - assets/prompts/word_book_ocr.prompt
