name: Build WordSnap APK

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    paths:
      - "lib/**"
      - "pubspec.yaml"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      - name: Generate Android scaffold
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --project-name wordsnap .
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK artifact
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/wordsnap-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordsnap-release-apk
          path: build/app/outputs/flutter-apk/wordsnap-release.apk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-apk
    runs-on: ubuntu-latest

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: wordsnap-release-apk
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wordsnap-release.apk
          generate_release_notes: true
