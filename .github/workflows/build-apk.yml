name: Build WordSnap APK

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    paths:
      - "lib/**"
      - "pubspec.yaml"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      - name: Generate Android scaffold
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --project-name wordsnap .
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
          else
            echo "ANDROID_KEYSTORE_BASE64 is not configured. Falling back to debug signing."
          fi

      - name: Build release APKs
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      - name: Rename APK artifacts
        run: |
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            build/app/outputs/flutter-apk/wordsnap-armeabi-v7a-release.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            build/app/outputs/flutter-apk/wordsnap-arm64-v8a-release.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
            build/app/outputs/flutter-apk/wordsnap-x86_64-release.apk

      - name: Upload armeabi-v7a APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordsnap-armeabi-v7a-release-apk
          path: build/app/outputs/flutter-apk/wordsnap-armeabi-v7a-release.apk
          if-no-files-found: error

      - name: Upload arm64-v8a APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordsnap-arm64-v8a-release-apk
          path: build/app/outputs/flutter-apk/wordsnap-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload x86_64 APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordsnap-x86_64-release-apk
          path: build/app/outputs/flutter-apk/wordsnap-x86_64-release.apk
          if-no-files-found: error

      - name: Publish APKs to latest installers release
        if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: latest-installers
          RELEASE_TITLE: WordSnap Latest Installers
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "Rolling installer downloads from the latest successful builds." \
              --prerelease || true
          fi

          gh release edit "$RELEASE_TAG" \
            --title "$RELEASE_TITLE" \
            --notes "Rolling installer downloads from the latest successful builds. Android split APKs were updated from commit $GITHUB_SHA." \
            --prerelease

          gh release delete-asset "$RELEASE_TAG" wordsnap-release.apk -y || true

          gh release upload "$RELEASE_TAG" \
            build/app/outputs/flutter-apk/wordsnap-armeabi-v7a-release.apk \
            build/app/outputs/flutter-apk/wordsnap-arm64-v8a-release.apk \
            build/app/outputs/flutter-apk/wordsnap-x86_64-release.apk \
            --clobber

      - name: Publish APKs to version release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/wordsnap-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/wordsnap-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/wordsnap-x86_64-release.apk
          generate_release_notes: true
