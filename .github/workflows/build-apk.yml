name: Build WordSnap APK

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    paths:
      - "lib/**"
      - "pubspec.yaml"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      - name: Generate Android scaffold
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --project-name wordsnap .
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK artifact
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/wordsnap-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordsnap-release-apk
          path: build/app/outputs/flutter-apk/wordsnap-release.apk
          if-no-files-found: error

      - name: Publish APK to latest installers release
        if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: latest-installers
          RELEASE_TITLE: WordSnap Latest Installers
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "Rolling installer downloads from the latest successful builds." \
              --prerelease || true
          fi

          gh release edit "$RELEASE_TAG" \
            --title "$RELEASE_TITLE" \
            --notes "Rolling installer downloads from the latest successful builds. Android APK was updated from commit $GITHUB_SHA." \
            --prerelease

          gh release delete-asset "$RELEASE_TAG" wordsnap-armeabi-v7a-release.apk -y || true
          gh release delete-asset "$RELEASE_TAG" wordsnap-arm64-v8a-release.apk -y || true
          gh release delete-asset "$RELEASE_TAG" wordsnap-x86_64-release.apk -y || true

          gh release upload "$RELEASE_TAG" \
            build/app/outputs/flutter-apk/wordsnap-release.apk \
            --clobber

      - name: Publish APK to version release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/wordsnap-release.apk
          generate_release_notes: true
